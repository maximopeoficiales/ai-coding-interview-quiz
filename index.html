<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Quiz de preparacion para entrevista AI Coding Engineer - Synopsis" />
  <title>Quiz — AI Coding Engineer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- VISTA 1: MENU PRINCIPAL -->
  <div id="view-menu" class="view active">
    <header class="app-header">
      <div class="header-badge">Entrevista</div>
      <h1>AI Coding Engineer</h1>
      <p class="subtitle">Quiz de preparacion — Synopsis</p>
      <div class="stats-bar">
        <span id="global-progress-label">0 / 70 respondidas</span>
      </div>
    </header>

    <main class="menu-main">
      <section class="mode-section">
        <h2>Modo examen</h2>
        <button class="btn-exam" id="btn-full-exam">
          <span class="btn-icon">⚡</span>
          <div class="btn-content">
            <strong>Examen Completo</strong>
            <small>70 preguntas · todos los bloques mezclados</small>
          </div>
        </button>
      </section>

      <section class="mode-section">
        <h2>Practicar por bloque</h2>
        <div class="blocks-grid" id="blocks-grid">
          <!-- Generado por JS -->
        </div>
      </section>
    </main>
  </div>

  <!-- VISTA 2: QUIZ ACTIVO -->
  <div id="view-quiz" class="view">
    <header class="quiz-header">
      <button class="btn-back" id="btn-back">← Volver</button>
      <div class="quiz-title-wrap">
        <span id="quiz-mode-label" class="mode-label"></span>
        <span id="quiz-counter" class="counter"></span>
      </div>
    </header>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <main class="quiz-main">
      <div class="question-card">
        <p id="question-text" class="question-text"></p>

        <div id="options-list" class="options-list">
          <!-- Generado por JS -->
        </div>

        <div id="feedback-box" class="feedback-box hidden">
          <p id="feedback-text"></p>
        </div>
      </div>

      <div class="quiz-actions">
        <button class="btn-next hidden" id="btn-next">Siguiente →</button>
      </div>
    </main>
  </div>

  <!-- VISTA 3: RESULTADOS -->
  <div id="view-results" class="view">
    <header class="results-header">
      <h1 id="results-title">Resultados</h1>
    </header>

    <main class="results-main">
      <div class="score-circle-wrap">
        <div class="score-circle" id="score-circle">
          <span id="score-percent">0%</span>
          <small>correctas</small>
        </div>
      </div>

      <div class="score-detail">
        <p id="score-summary"></p>
      </div>

      <div id="block-breakdown" class="block-breakdown hidden">
        <h2>Desglose por bloque</h2>
        <div id="breakdown-list"></div>
      </div>

      <div id="wrong-answers" class="wrong-answers hidden">
        <h2>Preguntas incorrectas</h2>
        <div id="wrong-list"></div>
      </div>

      <div class="results-actions">
        <button class="btn-retry hidden" id="btn-retry">Repetir falladas</button>
        <button class="btn-home" id="btn-home">← Menu principal</button>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
